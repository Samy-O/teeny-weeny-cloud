site_name: teeny-weeny-cloud
site_description: An almost 1-click self-hosted personal cloud.
repo_url: https://github.com/oubouazizsamy/teeny-weeny-cloud

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Setup: setup.md
  - Production: production.md
  - Authentication: authentication.md
  - Troubleshooting: troubleshooting.md
  - Going further: going-further.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
